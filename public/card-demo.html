<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>image-to-theme-colors — demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Lora:wght@500;600;700&family=Geist:wght@400;500;600&display=swap" />
<style>
  :root {
    --ui-fg: #2A2925;
    --ui-fg-dim: #6E6B65;
    --ui-bg: #FAF7F2;
    --ui-border: #E8E4DD;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.5 "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ui-fg);
    background: var(--ui-bg);
    min-height: 100vh;
    padding: 40px 24px 96px;
  }
  .wrap { max-width: 1320px; margin: 0 auto; }
  h1 { font: 600 22px/1.2 inherit; margin: 0 0 4px; }
  .lede { color: var(--ui-fg-dim); margin: 0 0 32px; }
  .panel {
    border: 1px solid var(--ui-border);
    background: #FFF;
    border-radius: 16px;
    padding: 20px;
  }
  .uploader { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .uploader input[type=file] { display: none; }
  .uploader label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 10px;
    background: var(--ui-fg); color: #FFF; cursor: pointer;
    font-weight: 500; font-size: 14px;
  }
  .uploader label:hover { opacity: .9; }
  .uploader .filename { color: var(--ui-fg-dim); font-size: 14px; }
  .err { color: #B91C1C; margin-top: 12px; font-size: 14px; }

  .results {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
    margin-top: 32px;
  }
  @media (max-width: 880px) { .results { grid-template-columns: 1fr; } }

  .surface { padding: 32px 28px; border-radius: 16px; min-height: 600px; }
  .surface .label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; letter-spacing: .04em; text-transform: uppercase;
    margin: 0 0 20px;
  }
  .surface[data-theme=light] .label { color: rgba(0,0,0,.5); }
  .surface[data-theme=dark]  .label { color: rgba(255,255,255,.55); }

  /* ---- Card ---- */
  .card {
    width: 100%; max-width: 360px; margin: 0 auto;
    border-radius: 24px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 6px 22px rgba(0,0,0,.08);
    position: relative;
    background: linear-gradient(to bottom, var(--cardBgStart), var(--cardBgEnd));
  }
  .card-image {
    aspect-ratio: 1;
    background: #DDD center/cover;
    flex: none;
    -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent);
            mask-image: linear-gradient(to bottom, #000 70%, transparent);
  }
  .card-body {
    flex: 1;
    /* % margin/padding are relative to card width — equal to image height
       since the image is square, so the numbers are also % of image height. */
    margin-top: -30%;            /* overlap the image's bottom 30% (the fade zone) */
    padding: 20% 22px 22px;      /* push title past the fade so the image ends before it */
    display: flex; flex-direction: column;
    position: relative;          /* paint above the image */
  }
  .card-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; margin-bottom: 14px; color: var(--cardContent); }
  .card-tag .material-symbols-outlined { font-size: 18px; }
  .card-title { font: 600 21px/1.22 "Lora", "Iowan Old Style", "Charter", "Georgia", serif; margin: 0 0 10px; color: var(--cardTitle); }
  .card-desc { font-size: 14px; line-height: 1.42; margin: 0 0 auto; color: var(--cardSubtitle); }
  .card-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 18px;
  }
  .card-actions .right { display: flex; gap: 10px; }
  .iconbtn {
    width: 40px; height: 40px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--btnBg);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    color: var(--cardContent);
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .iconbtn .material-symbols-outlined { font-size: 22px; }

  /* ---- Open-state body preview ---- */
  .article {
    width: 100%; max-width: 480px; margin: 0 auto;
    border-radius: 20px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 6px 22px rgba(0,0,0,.08);
    background: linear-gradient(to bottom, var(--bodyBgStart), var(--bodyBgEnd));
  }
  .article-image {
    aspect-ratio: 1;
    background: #DDD center/cover;
    flex: none;
    -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent);
            mask-image: linear-gradient(to bottom, #000 70%, transparent);
  }
  .article-body {
    flex: 1;
    margin-top: -30%;
    padding: 22% 28px 36px;
    color: var(--articleText);
    position: relative;
  }
  .article-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; margin-bottom: 14px; color: var(--articleTag); }
  .article-tag .material-symbols-outlined { font-size: 18px; }
  .article-title { font: 600 26px/1.18 "Lora", "Iowan Old Style", "Charter", "Georgia", serif; margin: 0 0 12px; }
  .article-text { font-size: 15px; line-height: 1.55; opacity: .92; margin: 0 0 12px; }

  /* ---- Hex outputs ---- */
  .colors { margin-top: 24px; display: flex; flex-direction: column; gap: 6px; }
  .color-row { display: grid; grid-template-columns: minmax(140px, auto) 1fr auto; align-items: center; gap: 8px; }
  .surface[data-theme=light] .color-row .lbl { color: rgba(0,0,0,.6); }
  .surface[data-theme=dark]  .color-row .lbl { color: rgba(255,255,255,.65); }
  .color-row .lbl { font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; white-space: nowrap; }
  .color-row .field { display: inline-flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 8px; min-width: 0; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.08); }
  .surface[data-theme=dark] .color-row .field { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
  .color-row .sw { width: 16px; height: 16px; border-radius: 4px; flex: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,.1); }
  .color-row input {
    flex: 1; min-width: 0; border: none; background: transparent;
    font: 12px/1.4 ui-monospace, "SF Mono", Menlo, monospace; color: inherit;
    padding: 2px 0; outline: none;
  }
  .copy-btn {
    border: none; background: transparent; cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    color: inherit; opacity: .7;
  }
  .copy-btn:hover { opacity: 1; background: rgba(0,0,0,.06); }
  .surface[data-theme=dark] .copy-btn:hover { background: rgba(255,255,255,.08); }
  .copy-btn .material-symbols-outlined { font-size: 18px; }
  .copy-btn.copied { color: #16A34A; opacity: 1; }

  .placeholder { display: flex; align-items: center; justify-content: center; height: 600px; color: var(--ui-fg-dim); font-size: 14px; border-radius: 16px; border: 1px dashed var(--ui-border); }
</style>
</head>
<body>
<div class="wrap">
  <h1>image-to-theme-colors — demo</h1>
  <p class="lede">Upload an image to preview the feed card and the open-state article in both themes.</p>

  <div class="panel uploader">
    <label for="file">
      <span class="material-symbols-outlined" style="font-size:18px">upload</span>
      <span>Choose image</span>
    </label>
    <input type="file" id="file" accept="image/*" />
    <span class="filename" id="filename">No image selected</span>
  </div>
  <div class="err" id="err"></div>

  <div class="results" id="results">
    <div class="placeholder">Light card preview</div>
    <div class="placeholder">Light article preview</div>
    <div class="placeholder">Dark card preview</div>
    <div class="placeholder">Dark article preview</div>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const fileInput = $('#file');
const filename = $('#filename');
const err = $('#err');
const results = $('#results');

// 15% opacity hex suffix → 0.15 * 255 = 38.25 ≈ 0x26
const ALPHA_15 = '26';

const sym = (name) => `<span class="material-symbols-outlined">${name}</span>`;
const ICON = {
  book:  sym('menu_book'),
  dots:  sym('more_horiz'),
  share: sym('ios_share'),
  heart: sym('favorite'),
  copy:  sym('content_copy'),
  check: sym('check'),
};

function buildCard(theme, imageDataUrl, themeName) {
  const bgStart = theme.card.background.linearGradient[0];
  const bgEnd   = theme.card.background.linearGradient[1];
  const content = theme.card.content.color;
  const t = theme.card.text;
  return `
    <div class="card" style="
      --cardBgStart: ${bgStart};
      --cardBgEnd: ${bgEnd};
      --cardContent: ${content};
      --cardTitle: ${t.title};
      --cardSubtitle: ${t.subtitle};
      --btnBg: ${content}${ALPHA_15};
    ">
      <div class="card-image" style="background-image: url('${imageDataUrl}')"></div>
      <div class="card-body">
        <span class="card-tag">${ICON.book} Article</span>
        <h3 class="card-title">Becoming Whole Again: Finding Yourself After the Love Ends</h3>
        <p class="card-desc">A gentle guide to healing your heart, rediscovering your identity, and rebuilding your life.</p>
        <div class="card-actions">
          <button class="iconbtn dots" title="More">${ICON.dots}</button>
          <div class="right">
            <button class="iconbtn" title="Share">${ICON.share}</button>
            <button class="iconbtn" title="Like">${ICON.heart}</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function buildArticle(theme, imageDataUrl, themeName) {
  const bgStart = theme.body.background.linearGradient[0];
  const bgEnd   = theme.body.background.linearGradient[1];
  const t = theme.card.text;
  const tagColor = theme.card.content.color;
  return `
    <div class="article" style="
      --bodyBgStart: ${bgStart};
      --bodyBgEnd: ${bgEnd};
      --articleText: ${t.title};
      --articleSubtle: ${t.subtitle};
      --articleTag: ${tagColor};
    ">
      <div class="article-image" style="background-image: url('${imageDataUrl}')"></div>
      <div class="article-body">
        <span class="article-tag">${ICON.book} Article</span>
        <h2 class="article-title">Becoming Whole Again: Finding Yourself After the Love Ends</h2>
        <p class="article-text">A gentle guide to healing your heart, rediscovering your identity, and rebuilding your life — one quiet, deliberate step at a time.</p>
        <p class="article-text">When something ends, it leaves behind a shape — a hollow that we instinctively try to fill. But the work of becoming whole again isn't refilling the shape; it's growing past it.</p>
      </div>
    </div>
  `;
}

function colorRow(label, hex) {
  return `
    <div class="color-row">
      <span class="lbl">${label}</span>
      <span class="field">
        <span class="sw" style="background:${hex}"></span>
        <input type="text" value="${hex}" readonly spellcheck="false" />
      </span>
      <button class="copy-btn" data-copy="${hex}" title="Copy ${hex}">${ICON.copy}</button>
    </div>
  `;
}

function chipsFor(theme) {
  const b = theme.body.background;
  const c = theme.card.background;
  return `
    <div class="colors">
      ${colorRow('body.background',          b.color)}
      ${colorRow('body.gradient end',        b.linearGradient[1])}
      ${colorRow('card.background',          c.color)}
      ${colorRow('card.gradient end',        c.linearGradient[1])}
      ${colorRow('card.content',             theme.card.content.color)}
      ${colorRow('card.text.title',          theme.card.text.title)}
      ${colorRow('card.text.subtitle',       theme.card.text.subtitle)}
    </div>
  `;
}

function render(data) {
  const { themes, imageDataUrl } = data;
  const FEED_LIGHT = '#F0F0F0';
  const FEED_DARK  = '#110F0E';

  results.innerHTML = `
    <div class="surface" data-theme="light" style="background:${FEED_LIGHT}; color:#2A2925">
      <p class="label">Light · feed card</p>
      ${buildCard(themes.light, imageDataUrl, 'light')}
      ${chipsFor(themes.light)}
    </div>
    <div class="surface" data-theme="light" style="background:${FEED_LIGHT}; color:#2A2925">
      <p class="label">Light · open state</p>
      ${buildArticle(themes.light, imageDataUrl, 'light')}
    </div>
    <div class="surface" data-theme="dark" style="background:${FEED_DARK}; color:#FFFFFF">
      <p class="label">Dark · feed card</p>
      ${buildCard(themes.dark, imageDataUrl, 'dark')}
      ${chipsFor(themes.dark)}
    </div>
    <div class="surface" data-theme="dark" style="background:${FEED_DARK}; color:#FFFFFF">
      <p class="label">Dark · open state</p>
      ${buildArticle(themes.dark, imageDataUrl, 'dark')}
    </div>
  `;
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error);
    fr.readAsDataURL(file);
  });
}

// Copy handler — delegated so it works for re-rendered rows.
results.addEventListener('click', async (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const value = btn.dataset.copy;
  try {
    await navigator.clipboard.writeText(value);
    btn.innerHTML = ICON.check;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = ICON.copy;
      btn.classList.remove('copied');
    }, 1100);
  } catch {
    // Fallback for non-secure contexts: select the input next to it.
    const input = btn.parentElement?.querySelector('input');
    if (input) { input.select(); document.execCommand?.('copy'); }
  }
});
results.addEventListener('focus', (e) => {
  if (e.target.tagName === 'INPUT') e.target.select();
}, true);

fileInput.addEventListener('change', async (e) => {
  err.textContent = '';
  const f = e.target.files?.[0];
  if (!f) return;
  filename.textContent = f.name;
  try {
    const imageDataUrl = await fileToDataUrl(f);
    const r = await fetch('/colors', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ imageDataUrl }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Request failed');
    render(data);
  } catch (e) {
    err.textContent = e.message;
  }
});
</script>
</body>
</html>
