<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Article Colors</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1a1a1a; color: #e0e0e0; min-height: 100vh;
  }
  .header {
    padding: 16px 24px; display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid #333;
  }
  .header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .upload-area { display: flex; align-items: center; gap: 12px; }
  .upload-area label {
    display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px;
    background: #2d6cdf; color: white; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: background 0.15s;
  }
  .upload-area label:hover { background: #1b56c0; }
  .upload-area input[type="file"] { display: none; }
  .file-count { font-size: 12px; color: #888; }
  .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid #555; border-top-color: #2d6cdf; border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .spinner.visible { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results { padding: 24px; display: flex; flex-direction: column; gap: 32px; max-width: 1200px; margin: 0 auto; }
  .image-group h2 {
    font-size: 13px; font-weight: 500; color: #888; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .image-group h2 .swatch {
    display: inline-block; width: 12px; height: 12px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .previews { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .previews { grid-template-columns: 1fr; } }
  .article-preview { border-radius: 14px; overflow: hidden; box-shadow: 0 2px 20px rgba(0,0,0,0.35); }
  .article-preview .hero { position: relative; aspect-ratio: 1 / 1; overflow: hidden; }
  .article-preview .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .article-preview .hero .fade {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60%; pointer-events: none;
  }
  .article-preview .body { padding: 20px 24px 28px; }
  .article-preview .theme-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; opacity: 0.45; margin-bottom: 10px;
  }
  .article-preview .title { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .article-preview .excerpt { font-size: 16px; font-weight: 400; line-height: 1.65; }
  .article-preview .color-info {
    margin-top: 14px; font-size: 11px; font-family: "SF Mono", Menlo, monospace; opacity: 0.35;
  }
  .empty-state { text-align: center; padding: 80px 24px; color: #555; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1>Image to Article Colors</h1>
  <div class="upload-area">
    <label>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 5l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 11v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Upload Images
      <input type="file" id="fileInput" accept="image/*" multiple>
    </label>
    <span class="file-count" id="fileCount"></span>
    <div class="spinner" id="spinner"></div>
  </div>
</div>
<div class="results" id="results">
  <div class="empty-state">Upload images to see article background color previews.</div>
</div>
<script>
const TITLE = "The Quiet Weight of Unseen Effort";
const EXCERPT = "We rarely talk about the invisible labor that holds everything together — the late nights, the second-guessing, the small compromises no one notices. But it's there, in every pixel, every paragraph, every carefully chosen word. And sometimes, the most important work is the kind that never gets acknowledged.";
const fileInput = document.getElementById("fileInput");
const results = document.getElementById("results");
fileInput.addEventListener("change", async () => {
  const files = fileInput.files;
  if (!files || files.length === 0) return;
  document.getElementById("fileCount").textContent = files.length + " file" + (files.length > 1 ? "s" : "");
  document.getElementById("spinner").classList.add("visible");
  const form = new FormData();
  for (const f of files) form.append("images", f);
  try {
    const res = await fetch("/api/analyze", { method: "POST", body: form });
    renderResults(await res.json());
  } catch (err) {
    results.innerHTML = '<div class="empty-state">Error: ' + err.message + "</div>";
  } finally {
    document.getElementById("spinner").classList.remove("visible");
  }
});
function renderResults(data) {
  results.innerHTML = "";
  for (const item of data) {
    if (!item.colors) { results.innerHTML += '<div class="empty-state">Error processing ' + esc(item.name) + "</div>"; continue; }
    const g = document.createElement("div");
    g.className = "image-group";
    g.innerHTML =
      '<h2>' + esc(item.name) +
      ' <span class="swatch" style="background:' + item.colors.light + '"></span> ' + item.colors.light +
      ' <span class="swatch" style="background:' + item.colors.dark + '"></span> ' + item.colors.dark + '</h2>' +
      '<div class="previews">' +
      card(item.dataUrl, item.colors.light, "#2A2925", "Light", item.colors.light) +
      card(item.dataUrl, item.colors.dark, "#FFFFFF", "Dark", item.colors.dark) +
      "</div>";
    results.appendChild(g);
  }
}
function card(img, bg, text, label, hex) {
  return '<div class="article-preview" style="background:' + bg + '">' +
    '<div class="hero"><img src="' + img + '" alt=""><div class="fade" style="background:linear-gradient(to bottom,transparent 0%,' + bg + ' 100%)"></div></div>' +
    '<div class="body" style="color:' + text + '">' +
    '<div class="theme-label">' + label + '</div>' +
    '<div class="title">' + TITLE + '</div>' +
    '<div class="excerpt">' + EXCERPT + '</div>' +
    '<div class="color-info">' + hex + '</div></div></div>';
}
function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
